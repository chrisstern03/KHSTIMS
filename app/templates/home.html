<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KHSTI Mangement System </title>
  <style>
    :root {
      --primary-white: #FFFFFF;
      --accent-dark-green: #2E8B57;
      --bold-black: #000000;
      --light-gray: #f8f8f8;
      --text-color: #333333;
      --border-color: #e0e0e0;
      --dark-accent-green: #247a48;
    }

    body {
      font-family: 'Lato', sans-serif;
      margin: 60px;
      background-color: var(--light-gray);
      color: var(--text-color);
    }

    .card {
      max-width: 720px;
      padding: 24px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background-color: var(--primary-white);
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    h1 {
      margin: 0 0 10px 0;
      color: var(--accent-dark-green);
    }


  </style>
</head>
<body>
  <div class="card">
    <h1>Hello ISI 490 from Christina Stern</h1>
    
    <!-- Can add more here at a later date -->

  </div>
</body>
</html>
